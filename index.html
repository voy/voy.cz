<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vojtech Jasny</title>
  <meta name="description" content="Personal site of Vojtech Jasny. I build things that should exist.">
  <meta property="og:title" content="Vojtech Jasny">
  <meta property="og:description" content="I build things that should exist.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://voy.cz/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400..600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --skyline-a: #1c2128;
      --skyline-b: #21262d;
      --skyline-c: #252c35;
      --skyline-d: #2d333b;
      --ring:      #3a4250;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --surface: #f6f8fa;
        --border: #d0d7de;
        --text: #1f2328;
        --muted: #59636e;
        --accent: #0969da;
        --skyline-a: #c8d1da;
        --skyline-b: #6e7781;
        --skyline-c: #424a53;
        --skyline-d: #1f2328;
        --ring:      #555d68;
      }
      .window, .beacon { display: none; }
      .status .route { color: #0550ae; }
      .status .route stop { stop-color: #0550ae; }
    }

    @media (prefers-reduced-motion: reduce) {
      .window, .beacon { animation: none; }
      .status .route circle { fill: currentColor; opacity: 0.8; }
      .status .route line { stroke: currentColor; opacity: 0.8; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    /* ── Main ── */

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px 24px;
    }

    h1 {
      font-family: "Literata", Georgia, "Times New Roman", serif;
      font-size: clamp(44px, 7vw, 72px);
      font-weight: 500;
      font-optical-sizing: auto;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
    }

    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    nav a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      color: var(--accent);
    }

    .tagline {
      margin-top: 14px;
      color: var(--muted);
      font-size: 16px;
    }

    /* ── Status line ── */

    .status {
      margin-top: 10px;
      font-family: ui-monospace, "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Links ── */

    nav {
      margin-top: 32px;
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 14px;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--accent); }

    nav .sep {
      color: var(--border);
      user-select: none;
    }

    .status .route {
      display: inline-block;
      vertical-align: middle;
      margin: 0 8px;
      color: var(--accent);
    }

    .status .route circle { fill: url(#routeShimmer); }
    .status .route line   { stroke: url(#routeShimmer); }
    .status .route stop   { stop-color: var(--accent); }

    .status .route .shim-a   { animation: shimEnd   4s ease-in-out infinite; }
    .status .route .shim-mid { animation: shimMid   4s ease-in-out infinite; }
    .status .route .shim-b   { animation: shimStart 4s ease-in-out infinite; }

    @keyframes shimEnd   { 0%, 100% { stop-opacity: 1; }    50% { stop-opacity: 0.2; } }
    @keyframes shimMid   { 0%, 50%, 100% { stop-opacity: 0.2; } 25%, 75% { stop-opacity: 1; } }
    @keyframes shimStart { 0%, 100% { stop-opacity: 0.2; } 50% { stop-opacity: 1; } }

    /* ── Skyline details ── */

    .window {
      fill: #ffd27a;
      animation: flicker 7s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.28; }
      45%      { opacity: 0.45; }
      55%      { opacity: 0.15; }
    }

    .beacon {
      fill: #ff6b6b;
      animation: beacon 2.2s ease-in-out infinite;
    }

    @keyframes beacon {
      0%, 70%, 100% { opacity: 0.25; }
      35%           { opacity: 1; }
    }

    /* ── Footer ── */

    footer {
      padding: 0 16px;
      display: flex;
      justify-content: center;
    }

    footer svg { display: block; width: 195px; height: 104px; }

    /* ── Mobile ── */

    @media (max-width: 540px) {
      footer svg { width: 120px; height: 64px; }
    }
  </style>
</head>
<body>

<main>
  <h1>Vojtech Jasny</h1>
  <p class="tagline">I build things that should exist.</p>
  <p class="status">Berlin<svg class="route" width="60" height="11" viewBox="0 0 32 6" role="img" aria-label="and"><defs><linearGradient id="routeShimmer" gradientUnits="userSpaceOnUse" x1="2.5" x2="29.5" y1="0" y2="0"><stop class="shim-a" offset="0"/><stop class="shim-mid" offset="0.5"/><stop class="shim-b" offset="1"/></linearGradient></defs><circle cx="2.5" cy="3" r="1.3"/><line x1="5.5" y1="3" x2="26.5" y2="3" stroke-width="0.7" stroke-dasharray="2 1.5"/><circle cx="29.5" cy="3" r="1.3"/></svg>Prague</p>

  <nav>
    <a href="https://github.com/voy">github</a>
    <span class="sep">·</span>
    <a href="https://voy.github.io/lab">lab</a>
    <span class="sep">·</span>
    <a href="mailto:voy@voy.cz">email</a>
  </nav>
</main>
